<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
	<defs>
		<radialGradient id="haloRed" gradientUnits="userSpaceOnUse" cx="27" cy="27" r="23">
			<stop offset="0" stop-color="#F4361A" stop-opacity="0.6" />
			<stop offset="0.5" stop-color="#F4361A" stop-opacity="0.4" />
			<stop offset="1" stop-color="#F4361A" stop-opacity="0" />
		</radialGradient>
		<radialGradient id="haloAmber" gradientUnits="userSpaceOnUse" cx="43" cy="40" r="16">
			<stop offset="0" stop-color="#FB9606" stop-opacity="0.55" />
			<stop offset="0.55" stop-color="#FB9606" stop-opacity="0.36" />
			<stop offset="1" stop-color="#FB9606" stop-opacity="0" />
		</radialGradient>
	</defs>

	<rect width="64" height="64" rx="14" fill="#ffffff" />

	<!-- halos (glow difuso): el del rojo, más amplio e intenso -->
	<circle cx="27" cy="27" r="23" fill="url(#haloRed)" />
	<circle cx="43" cy="40" r="16" fill="url(#haloAmber)" />

	<!-- marcador noche cálida (récord absoluto): anillo blanco + núcleo ámbar,
	     queda parcialmente tapado por el bead rojo que va encima -->
	<circle cx="43" cy="40" r="15" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.2" />
	<circle cx="43" cy="40" r="10" fill="#FB9606" stroke="#1a1a1a" stroke-width="1.3" />

	<!-- marcador calor: bead rojo, encima -->
	<circle cx="27" cy="27" r="12.5" fill="#F4361A" stroke="#1a1a1a" stroke-width="1.5" />
</svg>
