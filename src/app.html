		<meta
			name="description"
			content="Cada estación de AEMET y el último récord de calor que ha batido, en un mapa de España que se actualiza a diario."
		/>
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Récords de temperatura" />
		<meta property="og:locale" content="es_ES" />
		<meta property="og:title" content="Récords de temperatura en España" />

			property="og:description"
			content="Cada estación de AEMET y el último récord de calor que ha batido, en un mapa que se actualiza a diario."
		/>

			content="Mapa de España con los récords de temperatura de las estaciones de AEMET"
		/>

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Récords de temperatura en España" />

			name="twitter:description"
			content="Cada estación de AEMET y el último récord de calor que ha batido, en un mapa que se actualiza a diario."
		/>
		<meta name="twitter:image" content="https://records-temperatura.adrimaqueda.com/og-image.png" />

		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@graph": [

						"alternateName": "Récords de temperatura en España",
						"url": "https://records-temperatura.adrimaqueda.com/",
						"inLanguage": "es",

							"name": "Adrián Maqueda",
							"url": "https://adrimaqueda.com"
